<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxian WebGL</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

<div id="gameWrapper">
  <!-- Canvas principal WebGL (buffer fixo 480×640) -->
  <canvas id="glCanvas" width="480" height="640"></canvas>

  <!-- Canvas 2D para HUD (texto, overlays) -->
  <canvas id="hud" width="480" height="640"></canvas>

  <!--
    Botão de tela cheia.
    Fica no canto inferior direito do wrapper.
    O ícone é trocado por fullscreen.js conforme o estado.
    Tecla de atalho: F
  -->
  <button id="fsBtn" title="Tela cheia (F)" aria-label="Alternar tela cheia">
    <!-- Ícone "expandir" — substituído por fullscreen.js ao entrar/sair -->
    <svg id="fsIcon" viewBox="0 0 16 16" aria-hidden="true">
      <!-- Quatro cantos apontando para fora = entrar em fullscreen -->
      <polyline points="1,5 1,1 5,1"/>
      <polyline points="11,1 15,1 15,5"/>
      <polyline points="15,11 15,15 11,15"/>
      <polyline points="5,15 1,15 1,11"/>
    </svg>
  </button>
</div>

<!-- Barra de atalhos (oculta em fullscreen via CSS) -->
<div id="keys">
  <span>← →</span> ou <span>A D</span> mover &nbsp;|&nbsp;
  <span>ESPAÇO</span> atirar &nbsp;|&nbsp;
  <span>P / ESC</span> pausar &nbsp;|&nbsp;
  <span>R</span> reiniciar &nbsp;|&nbsp;
  <span>F</span> tela cheia
</div>

<!--
  ORDEM DE CARREGAMENTO — cada script só pode usar símbolos
  definidos nos scripts anteriores (sem bundler/módulos ES).

  1.  utils/constants.js      — sem dependências
  2.  utils/math.js           — sem dependências
  3.  options/audioSystem.js  — usa: DEFAULT_SETTINGS, STATE_RUNNING
  4.  options/settingSystem.js— usa: DEFAULT_SETTINGS, AudioSystem
  5.  render/shaders.js       — sem dependências (strings GLSL puras)
  6.  render/glContext.js     — usa: VERT_SRC, FRAG_SRC, CANVAS_W, CANVAS_H
  7.  render/textureLoader.js — usa: GL, PLAYER_W/H, ENEMY_W/H, BULLET_W/H,
                                      EBULLET_W/H, CANVAS_W, CANVAS_H
  8.  render/renderer.js      — usa: GL
  9.  systems/input.js        — sem dependências de jogo
  10. core/state.js           — usa: STATE_RUNNING
  11. entities/player.js      — usa: Input, drawSprite, TEX, constantes de player
  12. entities/bullet.js      — usa: drawSprite, TEX, constantes de bullet
  13. systems/enemySystem.js  — usa: drawSprite, TEX, constantes de inimigos
  14. systems/collision.js    — usa: GameState, EnemySystem, Bullet, Player,
                                      aabbOverlap, constantes
  15. systems/shootingSystem.js — usa: Input, Bullet, Player
  16. render/hudRenderer.js   — usa: CANVAS_W, CANVAS_H, STATE_*
  17. core/game.js            — usa: todos os sistemas e entidades
  18. main.js                 — ponto de entrada, chama Game.start()
  19. utils/fullscreen.js     — usa: CANVAS_W, CANVAS_H (de constants.js)
                                Deve ser o último script: o DOM e todos os
                                sistemas precisam estar prontos antes.
-->
<script src="src/utils/constants.js"></script>
<script src="src/utils/math.js"></script>
<script src="src/options/audioSystem.js"></script>
<script src="src/options/settingSystem.js"></script>
<script src="src/render/shaders.js"></script>
<script src="src/render/glContext.js"></script>
<script src="src/render/textureLoader.js"></script>
<script src="src/render/renderer.js"></script>
<script src="src/systems/input.js"></script>
<script src="src/core/state.js"></script>
<script src="src/entities/player.js"></script>
<script src="src/entities/bullet.js"></script>
<script src="src/systems/enemySystem.js"></script>
<script src="src/systems/collision.js"></script>
<script src="src/systems/shootingSystem.js"></script>
<script src="src/render/hudRenderer.js"></script>
<script src="src/core/game.js"></script>
<script src="src/main.js"></script>
<script src="src/utils/fullscreen.js"></script>

</body>
</html>
